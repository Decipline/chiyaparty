    <meta name="description" content="Redirecting to Chiya Party — Lalitpur's coziest chiya garden." />
    <meta property="og:title" content="Chiya Party — कप सँग गफ" />
    <meta property="og:description" content="Lalitpur's coziest chiya & momo garden." />
    <meta property="og:url" content="https://chai-vibes-gallery.lovable.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <style>
      :root {
        color-scheme: light;
        --cream: #fff6e3;
        --marigold: #f5c76a;
        --terracotta: #d97742;
        --brick: #8b2f1a;
        --tea: #3d1608;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        min-height: 100dvh;
        background:
          radial-gradient(ellipse 80% 60% at 20% 15%, rgba(255,220,150,0.55), transparent 60%),
          radial-gradient(ellipse 70% 60% at 85% 90%, rgba(107,31,16,0.55), transparent 60%),
          linear-gradient(135deg, var(--marigold) 0%, var(--terracotta) 45%, var(--brick) 100%);
        color: var(--cream);
        font-family: "Fraunces", ui-serif, Georgia, serif;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 1.5rem;
        overflow: hidden;
      }
      /* soft floating light bulbs */
      body::before, body::after {
        content: "";
        position: fixed;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.55;
        pointer-events: none;
      }
      body::before { width: 320px; height: 320px; background: #ffd98a; top: -80px; left: -80px; }
      body::after  { width: 380px; height: 380px; background: #ff7a3d; bottom: -120px; right: -100px; }

      .card {
        position: relative;
        max-width: 26rem;
        padding: 2.75rem 2rem 2.25rem;
        border-radius: 1.75rem;
        background: linear-gradient(180deg, rgba(255,248,232,0.14), rgba(255,248,232,0.06));
        border: 1px solid rgba(255,248,232,0.22);
        backdrop-filter: blur(14px) saturate(140%);
        -webkit-backdrop-filter: blur(14px) saturate(140%);
        box-shadow:
          0 30px 80px -20px rgba(40,10,5,0.55),
          inset 0 1px 0 rgba(255,255,255,0.25);
        opacity: 0;
        transform: translateY(8px);
        animation: rise 500ms cubic-bezier(.2,.7,.2,1) 200ms forwards;
      }
      @keyframes rise { to { opacity: 1; transform: none; } }

      .eyebrow {
        font-family: "Caveat", cursive;
        font-size: 1.35rem;
        letter-spacing: 0.04em;
        color: #ffe6b8;
        margin: 0 0 0.35rem;
      }
      h1 {
        margin: 0;
        font-size: clamp(2.4rem, 7vw, 3.2rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1;
        text-shadow: 0 2px 24px rgba(0,0,0,0.35), 0 0 40px rgba(255,200,120,0.25);
      }
      .sub {
        margin: 0.75rem 0 1.75rem;
        font-size: 1.15rem;
        font-style: italic;
        color: #ffeccc;
        letter-spacing: 0.01em;
      }
      .divider {
        width: 60px;
        height: 1px;
        margin: 0 auto 1.5rem;
        background: linear-gradient(90deg, transparent, rgba(255,248,232,0.6), transparent);
      }
      .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 1.5rem; }
      .dot {
        width: 7px; height: 7px; border-radius: 50%;
        background: var(--cream); opacity: 0.35;
        animation: pulse 1.2s ease-in-out infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.2s; }
      .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse { 50% { opacity: 1; transform: translateY(-4px); } }

      a.btn {
        display: inline-block;
        padding: 0.85rem 1.75rem;
        border-radius: 9999px;
        background: var(--cream);
        color: var(--brick);
        text-decoration: none;
        font-family: "Fraunces", serif;
        font-weight: 700;
        font-size: 0.98rem;
        letter-spacing: 0.02em;
        box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.6);
        transition: transform .25s ease, box-shadow .25s ease;
      }
      a.btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 36px -10px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.7);
      }
      .foot {
        margin-top: 1.5rem;
        font-family: "Caveat", cursive;
        font-size: 1.1rem;
        color: rgba(255,248,232,0.75);
      }
    </style>
  </head>
  <body>
    <noscript><meta http-equiv="refresh" content="0;url=https://chai-vibes-gallery.lovable.app/" /></noscript>
    <main class="card">
      <p class="eyebrow">welcome to</p>
      <h1>Chiya Party</h1>
      <p class="sub">कप सँग गफ</p>
      <div class="divider"></div>
      <div class="dots" aria-hidden="true"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <a class="btn" href="https://chai-vibes-gallery.lovable.app/">Enter the garden →</a>
      <p class="foot">Lalitpur · fairy lights &amp; hot chiya</p>
    </main>
  </body>
</html>
